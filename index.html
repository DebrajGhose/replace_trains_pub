<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Train Compatibility</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="header">
  <h1 id="title">Loading…</h1>
  <p id="description"></p>
  <div id="city-switcher"></div>
</div>

<div id="legend">
  <div class="legend-section">Arrow direction</div>
  <div class="legend-row legend-direction">A&nbsp;<span class="legend-arrow">→</span>&nbsp;B&nbsp;&nbsp;=&nbsp;&nbsp;A’s train running on B’s tracks</div>
  <div class="legend-section">Color (vehicle compatibility)</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#a6e3a1"></span>Fully compatible</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#f9e2af"></span>Compatible with caveats</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#f38ba8"></span>Cannot run on this line</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#9399b2"></span>Undetermined / unknown</div>
  <div class="legend-section">Style (track connection)</div>
  <div class="legend-row"><span class="legend-line"></span>Tracks physically joined</div>
  <div class="legend-row"><span class="legend-line dashed"></span>Tracks not joined</div>
</div>

<svg id="graph"></svg>
<div id="tooltip"></div>

<div id="sources">
  <div class="label">Sources</div>
  <ul id="sources-list"></ul>
</div>

<a id="site-link" href="https://debrajghose.com" target="_blank" rel="noopener">debrajghose.com</a>

<script src="https://d3js.org/d3.v7.min.js"></script>
<!-- Register one city per script. Each file does `window.CITIES.<id> = {...}`. -->
<script src="cities/boston.js"></script>
<script src="cities/sanfrancisco.js"></script>
<script src="cities/newyork.js"></script>
<script src="cities/chicago.js"></script>
<script src="app.js"></script>
</body>
</html>
